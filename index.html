<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超尊科技 旅遊比價表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f2f4f8; --card: #fff; --txt: #1a1c2e; --txt2: #6b7280;
    --border: #e2e8f0; --radius: 14px;
    --shadow: 0 2px 10px rgba(0,0,0,.07); --shadow-h: 0 6px 24px rgba(0,0,0,.14);
    --tw: #0d6e2a; --tw-l: #e8f5ee; --tw-acc: #16a34a;
    --vn: #c0232b; --vn-l: #fff0f0; --vn-acc: #e03040;
    --th: #9b5e00; --th-l: #fff8e8; --th-acc: #d97706;
    --kr: #1e40af; --kr-l: #eef2ff; --kr-acc: #3b82f6;
    --jp: #7c1d4f; --jp-l: #fdf0f6; --jp-acc: #be185d;
    --my: #0e6e6e; --my-l: #e8fafa; --my-acc: #0891b2;
    --ph: #7e3a00; --ph-l: #fff4ea; --ph-acc: #ea580c;
    --cn: #7b1717; --cn-l: #fff3f3; --cn-acc: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--txt); }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0f1d3e 0%, #1a3a7a 100%);
    padding: 20px 40px; display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 200; box-shadow: 0 3px 16px rgba(0,0,0,.3);
  }
  .logo { width: 38px; height: 38px; border-radius: 8px; background: #f0a500; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 17px; color: #fff; flex-shrink: 0; }
  header h1 { color: #fff; font-size: 17px; font-weight: 700; }
  header h1 span { display: block; font-size: 11px; font-weight: 300; opacity: .55; margin-top: 1px; }
  .hd-count { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,.45); }

  /* FILTER BAR */
  .filter-bar {
    padding: 0 40px;
    background: var(--bg); border-bottom: 1px solid var(--border);
    position: sticky; top: 78px; z-index: 100;
  }
  .filter-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 10px 0;
  }
  .filter-row + .filter-row {
    border-top: 1px solid var(--border);
  }
  .fl { font-size: 15px; font-weight: 700; color: var(--txt2); text-transform: uppercase; letter-spacing: .03em; margin-right: 4px; white-space: nowrap; }
  .chip {
    padding: 7px 16px; border-radius: 20px; font-size: 15px; font-weight: 500;
    border: 1.5px solid var(--border); background: var(--card); color: var(--txt2);
    cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .chip:hover { border-color: #6b7280; color: var(--txt); }
  .chip.on { border-color: #1e40af; background: #eef2ff; color: #1e3a8a; font-weight: 700; }
  .sep { width: 1px; height: 20px; background: var(--border); margin: 0 3px; flex-shrink: 0; }

  /* PAGE */
  .page { padding: 26px 40px 60px; }

  /* DESTINATION GROUP */
  .dest-group { margin-bottom: 34px; }
  .dest-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .dest-flag { font-size: 22px; }
  .dest-name { font-size: 16px; font-weight: 900; }
  .dest-region { font-size: 13px; color: var(--txt2); }
  .multi-badge { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 12px; margin-left: 4px; }

  /* CARD GRID */
  .card-grid { display: grid; gap: 14px; }
  .card-grid.c1 { grid-template-columns: 1fr; }
  .card-grid.c2 { grid-template-columns: 1fr 1fr; }
  .card-grid.c3 { grid-template-columns: 1fr 1fr 1fr; }

  /* CARD */
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); border: 1.5px solid var(--border); overflow: hidden; transition: box-shadow .2s, transform .15s; }
  .card:hover { box-shadow: var(--shadow-h); transform: translateY(-2px); }
  .card-strip { height: 5px; }

  /* CARD TOP */
  .card-top { display: grid; grid-template-columns: 1fr auto; gap: 10px; padding: 15px 17px 12px; cursor: pointer; user-select: none; align-items: start; }
  .agency-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 5px; margin-bottom: 6px; }
  .b-water { background: #dbeafe; color: #1d4ed8; }
  .b-yuan  { background: #ffedd5; color: #c2410c; }
  .b-kola  { background: #dcfce7; color: #166534; }
  .b-lion  { background: #fce7f3; color: #9d174d; }
  .trip-name { font-size: 14px; font-weight: 700; line-height: 1.3; }
  .trip-sub { font-size: 11px; font-weight: 600; margin-top: 3px; }
  .trip-meta { font-size: 11px; color: var(--txt2); margin-top: 5px; line-height: 1.75; }
  .price-num { font-size: 19px; font-weight: 900; white-space: nowrap; }
  .price-sub { font-size: 10px; color: var(--txt2); margin-top: 3px; line-height: 1.5; text-align: right; }

  /* TOGGLE ROW */
  .toggle-row { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 7px; border-top: 1px dashed var(--border); cursor: pointer; font-size: 11px; font-weight: 600; color: var(--txt2); transition: background .15s; }
  .toggle-row:hover { background: #f8fafc; }
  .arrow { transition: transform .25s; display: inline-block; }
  .card.open .arrow { transform: rotate(180deg); }

  /* ITINERARY */
  .itin { display: none; border-top: 1.5px solid var(--border); }
  .card.open .itin { display: block; }
  .day-row { display: grid; grid-template-columns: 48px 1fr; border-bottom: 1px solid var(--border); min-height: 48px; }
  .day-row:last-child { border-bottom: none; }
  .day-lbl { display: flex; align-items: flex-start; justify-content: center; padding: 11px 0; border-right: 1px solid var(--border); }
  .day-pill { font-size: 10px; font-weight: 900; letter-spacing: .06em; padding: 3px 5px; border-radius: 5px; }
  .day-txt { padding: 10px 13px; font-size: 12px; color: var(--txt2); line-height: 1.8; }
  .day-txt.na { color: #c8ccd6; font-style: italic; }

  @media (max-width: 820px) {
    header { padding: 13px 16px; }
    .filter-bar, .page { padding-left: 14px; padding-right: 14px; }
    .card-grid.c2, .card-grid.c3 { grid-template-columns: 1fr; }
  }

  /* ── SUBMIT PANEL ── */
  .submit-panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
    background: #fff; border-top: 2px solid #e2e8f0;
    box-shadow: 0 -4px 24px rgba(0,0,0,.12);
    padding: 0;
    transition: transform .3s ease;
  }
  .submit-panel.hidden { transform: translateY(100%); }

  .sp-inner {
    max-width: 1200px; margin: 0 auto;
    padding: 14px 40px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }

  .sp-selections {
    display: flex; gap: 10px; flex: 1; flex-wrap: wrap; align-items: center;
  }
  .sp-label { font-size: 12px; font-weight: 700; color: #6b7280; white-space: nowrap; }
  .sel-tag {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
    animation: popIn .2s ease;
  }
  .sel-tag.dom-tag { background: #fffbeb; color: #92400e; }
  .sel-tag.ovs-tag { background: #fffbeb; color: #92400e; }
  .sel-tag .rm { cursor: pointer; font-size: 14px; opacity: .6; line-height: 1; }
  .sel-tag .rm:hover { opacity: 1; }
  .no-sel { font-size: 12px; color: #9ca3af; font-style: italic; }

  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .sp-btn {
    padding: 10px 24px; border-radius: 10px; border: none; cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 700;
    transition: all .15s; white-space: nowrap;
  }
  .sp-btn.fill-form { background: #1e3a8a; color: #fff; }
  .sp-btn.fill-form:hover { background: #1e40af; }
  .sp-btn:disabled { opacity: .35; cursor: not-allowed; }

  /* ── CARD SELECT STATE ── */
  .card.sel-dom { outline: 4px solid #f59e0b; outline-offset: 3px; box-shadow: 0 0 0 1px #f59e0b; }
  .card.sel-ovs { outline: 4px solid #f59e0b; outline-offset: 3px; box-shadow: 0 0 0 1px #f59e0b; }
  .sel-check {
    position: absolute; top: 10px; right: 10px;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #fff; font-weight: 900; opacity: 0;
    transition: opacity .15s;
  }
  .card { position: relative; }
  .card.sel-dom .sel-check.dom-chk,
  .card.sel-ovs .sel-check.ovs-chk { opacity: 1; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5);
    z-index: 400; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: #fff; border-radius: 16px; padding: 32px;
    width: 100%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .modal h2 { font-size: 18px; font-weight: 900; margin-bottom: 6px; color: #1a1c2e; }
  .modal .subtitle { font-size: 12px; color: #6b7280; margin-bottom: 24px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid.full { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; font-weight: 700; color: #374151; text-transform: uppercase; letter-spacing: .06em; }
  .field input, .field textarea, .field select {
    padding: 9px 12px; border-radius: 8px; border: 1.5px solid #e2e8f0;
    font-family: 'Noto Sans TC', sans-serif; font-size: 13px; color: #1a1c2e;
    transition: border-color .15s;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none; border-color: #3b82f6;
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .selection-summary {
    background: #f8fafc; border-radius: 8px; padding: 12px 14px;
    margin: 16px 0; border: 1.5px solid #e2e8f0;
  }
  .selection-summary p { font-size: 12px; color: #374151; line-height: 1.8; }
  .selection-summary strong { color: #1a1c2e; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel { flex: 1; padding: 11px; border-radius: 8px; border: 1.5px solid #e2e8f0; background: #fff; color: #6b7280; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-cancel:hover { background: #f8fafc; }
  .btn-submit { flex: 2; padding: 11px; border-radius: 8px; border: none; background: #1e3a8a; color: #fff; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: background .15s; }
  .btn-submit:hover { background: #1e40af; }
  .btn-submit:disabled { opacity: .4; cursor: not-allowed; }
  .sending-txt { display: none; }

  /* ── SUCCESS ── */
  .success-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.55);
    z-index: 500; display: flex; align-items: center; justify-content: center;
  }
  .success-overlay.hidden { display: none; }
  .success-box {
    background: #fff; border-radius: 16px; padding: 40px 32px; text-align: center;
    max-width: 360px; width: 90%;
  }
  .success-icon { font-size: 48px; margin-bottom: 12px; }
  .success-box h3 { font-size: 20px; font-weight: 900; color: #0d6e2a; margin-bottom: 8px; }
  .success-box p { font-size: 13px; color: #6b7280; line-height: 1.7; }
  .btn-close-success { margin-top: 20px; padding: 10px 28px; border-radius: 8px; border: none; background: #1e3a8a; color: #fff; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }


  /* ── CONFIRM MODAL ── */
  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.55);
    z-index: 450; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .confirm-overlay.hidden { display: none; }
  .confirm-box {
    background: #fff; border-radius: 16px; padding: 32px;
    width: 100%; max-width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .confirm-box h2 { font-size: 17px; font-weight: 900; color: #1a1c2e; margin-bottom: 18px;
    display: flex; align-items: center; gap: 8px; }
  .confirm-row { display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px;
    background: #f8fafc; border-radius: 8px; margin-bottom: 8px; border: 1.5px solid #e2e8f0; }
  .confirm-row-label { font-size: 11px; font-weight: 700; color: #6b7280;
    white-space: nowrap; margin-top: 2px; min-width: 52px; }
  .confirm-row-val { font-size: 13px; font-weight: 600; color: #1a1c2e; line-height: 1.5; }
  .confirm-divider { border: none; border-top: 1px dashed #e2e8f0; margin: 14px 0; }
  .confirm-person { font-size: 13px; color: #374151; line-height: 2; }
  .confirm-person span { font-weight: 700; color: #1a1c2e; }
  .confirm-warn { font-size: 11px; color: #d97706; background: #fffbeb;
    padding: 8px 12px; border-radius: 6px; margin-top: 12px; border: 1px solid #fde68a; }
  .confirm-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-confirm-back { flex: 1; padding: 11px; border-radius: 8px; border: 1.5px solid #e2e8f0;
    background: #fff; color: #6b7280; font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-confirm-back:hover { background: #f8fafc; }
  .btn-confirm-ok { flex: 2; padding: 11px; border-radius: 8px; border: none;
    background: #1e3a8a; color: #fff; font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: background .15s; }
  .btn-confirm-ok:hover { background: #1e40af; }

  /* ── BOTTOM PADDING so cards not hidden behind panel ── */
  .page { padding-bottom: 100px; }

  /* ── SELECT HINT on card hover ── */
  .card-select-hint {
    position: absolute; bottom: 0; left: 0; right: 0;
    font-size: 11px; font-weight: 700; text-align: center; padding: 6px;
    opacity: 0; transition: opacity .15s; pointer-events: none;
  }
  .card:hover .card-select-hint { opacity: 1; }

</style>
</head>
<body>

<header>
  <div class="logo">超</div>
  <h1>超尊科技 旅遊比價表<span>依目的地分組 · 共 20 個行程方案</span></h1>
  <div class="hd-count">2025 / 2026</div>
</header>

<div class="filter-bar">
  <div class="filter-row">
    <span class="fl">旅行社</span>
    <button class="chip on" onclick="flt('a','all',this)">全部</button>
    <button class="chip" onclick="flt('a','水母',this)">水母</button>
    <button class="chip" onclick="flt('a','原得',this)">原得</button>
    <button class="chip" onclick="flt('a','可樂',this)">可樂</button>
    <button class="chip" onclick="flt('a','雄獅',this)">雄獅</button>
  </div>
  <div class="filter-row">
    <span class="fl">國家</span>
    <button class="chip on" onclick="flt('c','all',this)">全部</button>
    <button class="chip" onclick="flt('c','台灣',this)">🇹🇼 台灣</button>
    <button class="chip" onclick="flt('c','越南',this)">🇻🇳 越南</button>
    <button class="chip" onclick="flt('c','泰國',this)">🇹🇭 泰國</button>
    <button class="chip" onclick="flt('c','韓國',this)">🇰🇷 韓國</button>
    <button class="chip" onclick="flt('c','日本',this)">🇯🇵 日本</button>
    <button class="chip" onclick="flt('c','馬來西亞',this)">🇲🇾 馬來西亞</button>
    <button class="chip" onclick="flt('c','菲律賓',this)">🇵🇭 菲律賓</button>
    <button class="chip" onclick="flt('c','中國',this)">🇨🇳 中國</button>
  </div>
  <div class="filter-row">
    <span class="fl">每人價格</span>
    <button class="chip on" onclick="flt('p','all',this)">全部</button>
    <button class="chip" onclick="flt('p','0-15000',this)">15,000 以下</button>
    <button class="chip" onclick="flt('p','15000-25000',this)">15,000–25,000</button>
    <button class="chip" onclick="flt('p','25000-30000',this)">25,000–30,000</button>
    <button class="chip" onclick="flt('p','30000-999999',this)">30,000 以上</button>
  </div>
</div>

<div class="page" id="page"></div>


<!-- ── SUBMIT PANEL ── -->
<div class="submit-panel" id="submitPanel">
  <div class="sp-inner">
    <div class="sp-selections">
      <span class="sp-label">已選：</span>
      <span id="selTags"><span class="no-sel">尚未勾選任何行程</span></span>
    </div>
    <button class="sp-btn fill-form" id="openFormBtn" onclick="openModal()" disabled>
      ✉️ 填寫資料並送出
    </button>
  </div>
</div>

<!-- ── FORM MODAL ── -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <h2>📋 填寫意願表單</h2>
    <p class="subtitle">填寫完成後資料將自動送至 Google Sheets</p>

    <div class="selection-summary" id="modalSummary"></div>

    <div class="form-grid">
      <div class="field">
        <label>姓名 *</label>
        <input type="text" id="fName" placeholder="請輸入姓名" required>
      </div>
      <div class="field">
        <label>部門 *</label>
        <input type="text" id="fDept" placeholder="例：業務部">
      </div>
      <div class="field">
        <label>預計參加人數 *</label>
        <input type="number" id="fCount" placeholder="例：2" min="1" max="99">
      </div>
      <div class="field">
        <label>聯絡電話／分機</label>
        <input type="text" id="fPhone" placeholder="選填">
      </div>
    </div>
    <div class="form-grid full" style="margin-top:12px">
      <div class="field">
        <label>偏好備註</label>
        <textarea id="fNote" placeholder="例：希望避開連假、需要無障礙設施…等"></textarea>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-submit" id="submitBtn" onclick="submitForm()">
        <span class="normal-txt">送出意願 →</span>
        <span class="sending-txt">送出中…</span>
      </button>
    </div>
  </div>
</div>


<!-- ── CONFIRM MODAL ── -->
<div class="confirm-overlay hidden" id="confirmOverlay">
  <div class="confirm-box">
    <h2>📋 請確認您的選擇</h2>
    <div class="confirm-row">
      <span class="confirm-row-label">🇹🇼 國內</span>
      <span class="confirm-row-val" id="confirmDom">—</span>
    </div>
    <div class="confirm-row">
      <span class="confirm-row-label">✈️ 國外</span>
      <span class="confirm-row-val" id="confirmOvs">—</span>
    </div>
    <hr class="confirm-divider">
    <div class="confirm-person" id="confirmPerson"></div>
    <div class="confirm-warn">⚠️ 確認送出後將無法修改，請再次確認行程與資料正確無誤。</div>
    <div class="confirm-actions">
      <button class="btn-confirm-back" onclick="closeConfirm()">← 返回修改</button>
      <button class="btn-confirm-ok" id="confirmOkBtn" onclick="doSubmit()">確認送出 ✓</button>
    </div>
  </div>
</div>

<!-- ── SUCCESS ── -->
<div class="success-overlay hidden" id="successOverlay">
  <div class="success-box">
    <div class="success-icon">✅</div>
    <h3>送出成功！</h3>
    <p id="successMsg">您的旅遊意願已記錄。<br>主管將統計後通知結果，謝謝！</p>
    <button class="btn-close-success" onclick="closeSuccess()">關閉</button>
  </div>
</div>


<script>

const DL = ['D1','D2','D3','D4','D5'];

function cv(v,k){ return `var(--${v}-${k})`; }

function render(data){
  document.getElementById('page').innerHTML = data.map((g,gi)=>{
    const c = g.cv;
    const cols = g.cards.length>=3?'c3':g.cards.length===2?'c2':'c1';
    const multi = g.cards.length>1
      ? `<span class="multi-badge" style="background:${cv(c,'l')};color:${cv(c,'h')}">${g.cards.length} 家可比較</span>`
      : '';
    const cardsHtml = g.cards.map((card,ci)=>{
      const uid = `g${gi}c${ci}`;
      const rows = DL.map((dl,di)=>{
        const t = card.days[di]||'—';
        const na = t==='—'||t==='N/A';
        return `<div class="day-row">
          <div class="day-lbl"><span class="day-pill" style="background:${na?'#f1f5f9':cv(c,'l')};color:${na?'#9ca3af':cv(c,'h')}">${dl}</span></div>
          <div class="day-txt${na?' na':''}">${na?'此行程不含此天':t}</div>
        </div>`;
      }).join('');
      return `<div class="card" id="${uid}" data-price="${card.price.replace(/,/g,'')}">
        <div class="card-strip" style="background:${cv(c,'acc')}"></div>
        <div class="card-top" onclick="selectCardById('${uid}')">
          <div>
            <div><span class="agency-badge ${card.badge}">${card.agency}</span></div>
            <div class="trip-name">${card.name}</div>
            ${card.sub?`<div class="trip-sub" style="color:${cv(c,'h')}">${card.sub}</div>`:''}
            <div class="trip-meta">📅 ${card.date.replace(/\n/g,' · ')}<br>👥 最低出團 ${card.min}</div>
          </div>
          <div>
            <div class="price-num" style="color:${cv(c,'h')}">NT$ ${card.price}</div>
            <div class="price-sub">${card.pn.replace(/\n/g,'<br>')}</div>
          </div>
        </div>
        <div class="toggle-row" onclick="tog('${uid}')">
          <span class="arrow">⌄</span><span>展開 D1–D5 行程</span>
        </div>
        <div class="itin">${rows}</div>
      </div>`;
    }).join('');
    return `<div class="dest-group" data-country="${g.country}" data-agencies="${g.cards.map(x=>x.agency).join(',')}">
      <div class="dest-header">
        <span class="dest-flag">${g.flag}</span>
        <span class="dest-name" style="color:${cv(c,'h')}">${g.country}</span>
        <span class="dest-region">· ${g.region}</span>${multi}
      </div>
      <div class="card-grid ${cols}">${cardsHtml}</div>
    </div>`;
  }).join('');
}

render(G);

function tog(id){ document.getElementById(id).classList.toggle('open'); }

let fA='all', fC='all', fP='all';
function flt(type,val,btn){
  const bar = btn.closest('.filter-bar');
  [...bar.querySelectorAll('.chip')].filter(c=>(c.getAttribute('onclick')||'').includes(`'${type}'`)).forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  if(type==='a') fA=val;
  else if(type==='c') fC=val;
  else fP=val;

  document.querySelectorAll('.dest-group').forEach(g=>{
    const mc = fC==='all'||g.dataset.country===fC;
    const ma = fA==='all'||g.dataset.agencies.includes(fA);

    // For price: show group if at least one card inside matches
    let mp = true;
    if(fP !== 'all'){
      const [lo,hi] = fP.split('-').map(Number);
      const cards = g.querySelectorAll('.card');
      let anyMatch = false;
      cards.forEach(card => {
        const p = parseInt(card.dataset.price)||0;
        if(p >= lo && p <= hi){ card.style.opacity='1'; card.style.pointerEvents=''; anyMatch=true; }
        else { card.style.opacity='0.25'; card.style.pointerEvents='none'; }
      });
      mp = anyMatch;
    } else {
      g.querySelectorAll('.card').forEach(card => { card.style.opacity='1'; card.style.pointerEvents=''; });
    }

    g.style.display = (mc && ma && mp) ? '' : 'none';
  });
}

const GAS_URL = 'https://script.google.com/macros/s/AKfycbyfROWg9lyKdIMvFUPQGi1BJxGrpWaI9Hza_YQ2zc4y0IzDTvB5v7ziBixYZd2WDP_N/exec';

// 國內外 tag 判斷
const DOM_COUNTRIES = ['台灣'];
function isDom(country){ return DOM_COUNTRIES.includes(country); }

let selDom = null; // { uid, name, agency, country }
let selOvs = null;

function getCardMeta(cardEl) {
  const group = cardEl.closest('.dest-group');
  const country = group ? group.dataset.country : '';
  const nameEl = cardEl.querySelector('.trip-name');
  const agencyEl = cardEl.querySelector('.agency-badge');
  const name = nameEl ? nameEl.textContent.trim() : '';
  const agency = agencyEl ? agencyEl.textContent.trim() : '';
  return { country, name, agency };
}

// Inject select UI into each card after render
function injectSelectUI() {
  document.querySelectorAll('.card').forEach(card => {
    if (card.querySelector('.sel-check')) return; // already injected
    const group = card.closest('.dest-group');
    const country = group ? group.dataset.country : '';
    const dom = isDom(country);
    const color = '#d97706';
    const cls   = dom ? 'dom-chk' : 'ovs-chk';
    const hint  = dom ? '點擊選為【國內行程】' : '點擊選為【國外行程】';

    // check badge
    const chk = document.createElement('div');
    chk.className = `sel-check ${cls}`;
    chk.style.background = color;
    chk.innerHTML = '✓';
    card.appendChild(chk);

    // hint bar
    const hintEl = document.createElement('div');
    hintEl.className = 'card-select-hint';
    hintEl.style.background = '#fffbeb';
    hintEl.style.color = '#d97706';
    hintEl.textContent = hint;
    card.appendChild(hintEl);

    // Selection is handled via onclick="selectCardById(uid)" on card-top
  });
}


function selectCardById(uid) {
  const card = document.getElementById(uid);
  if (!card) return;
  const group = card.closest('.dest-group');
  const country = group ? group.dataset.country : '';
  const dom = isDom(country);
  selectCard(card, dom);
}

function selectCard(card, dom) {
  const uid = card.id;
  const meta = getCardMeta(card);

  if (dom) {
    // deselect previous dom
    if (selDom && selDom.uid !== uid) {
      const prev = document.getElementById(selDom.uid);
      if (prev) prev.classList.remove('sel-dom');
    }
    if (selDom && selDom.uid === uid) {
      // toggle off
      card.classList.remove('sel-dom');
      selDom = null;
    } else {
      card.classList.add('sel-dom');
      selDom = { uid, ...meta };
    }
  } else {
    if (selOvs && selOvs.uid !== uid) {
      const prev = document.getElementById(selOvs.uid);
      if (prev) prev.classList.remove('sel-ovs');
    }
    if (selOvs && selOvs.uid === uid) {
      card.classList.remove('sel-ovs');
      selOvs = null;
    } else {
      card.classList.add('sel-ovs');
      selOvs = { uid, ...meta };
    }
  }
  updatePanel();
}

function updatePanel() {
  const tagsEl = document.getElementById('selTags');
  const btn = document.getElementById('openFormBtn');
  let html = '';

  if (selDom) {
    html += `<span class="sel-tag dom-tag">🇹🇼 ${selDom.name}（${selDom.agency}）<span class="rm" onclick="clearSel('dom')">✕</span></span>`;
  }
  if (selOvs) {
    html += `<span class="sel-tag ovs-tag">✈️ ${selOvs.name}（${selOvs.agency}）<span class="rm" onclick="clearSel('ovs')">✕</span></span>`;
  }
  if (!selDom && !selOvs) {
    html = '<span class="no-sel">尚未勾選任何行程（可各選 1 個國內＋1 個國外）</span>';
  }

  tagsEl.innerHTML = html;
  btn.disabled = (!selDom && !selOvs);
}

function clearSel(type) {
  if (type === 'dom' && selDom) {
    const el = document.getElementById(selDom.uid);
    if (el) el.classList.remove('sel-dom');
    selDom = null;
  }
  if (type === 'ovs' && selOvs) {
    const el = document.getElementById(selOvs.uid);
    if (el) el.classList.remove('sel-ovs');
    selOvs = null;
  }
  updatePanel();
}

function openModal() {
  // update summary in modal
  let sum = '';
  if (selDom) sum += `<p>🇹🇼 <strong>國內：</strong>${selDom.name}（${selDom.agency}）</p>`;
  if (selOvs) sum += `<p>✈️ <strong>國外：</strong>${selOvs.name}（${selOvs.agency}）</p>`;
  if (!sum) sum = '<p style="color:#9ca3af">尚未選擇行程</p>';
  document.getElementById('modalSummary').innerHTML = sum;
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
}

function closeSuccess() {
  document.getElementById('successOverlay').classList.add('hidden');
  // reset selections
  clearSel('dom'); clearSel('ovs');
  // reset form
  ['fName','fDept','fCount','fPhone','fNote'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

// ── 暫存表單資料，等確認後再送 ──
let _pendingPayload = null;

function submitForm() {
  const name  = document.getElementById('fName').value.trim();
  const dept  = document.getElementById('fDept').value.trim();
  const count = document.getElementById('fCount').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const note  = document.getElementById('fNote').value.trim();

  if (!name)  { alert('請填寫姓名'); return; }
  if (!dept)  { alert('請填寫部門'); return; }
  if (!count) { alert('請填寫參加人數'); return; }

  const domTrip = selDom ? `${selDom.name}（${selDom.agency}）` : '未選擇';
  const ovsTrip = selOvs ? `${selOvs.name}（${selOvs.agency}）` : '未選擇';

  _pendingPayload = { name, dept, count, phone, note, domTrip, ovsTrip,
                      timestamp: new Date().toLocaleString('zh-TW') };

  // 填入確認彈窗內容
  document.getElementById('confirmDom').textContent  = domTrip;
  document.getElementById('confirmOvs').textContent  = ovsTrip;
  document.getElementById('confirmPerson').innerHTML =
    `姓名：<span>${name}</span>　部門：<span>${dept}</span>　` +
    `人數：<span>${count} 人</span>` +
    (phone ? `　電話：<span>${phone}</span>` : '') +
    (note  ? `<br>備註：<span>${note}</span>` : '');

  // 關閉表單Modal，開啟確認Modal
  closeModal();
  document.getElementById('confirmOverlay').classList.remove('hidden');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.add('hidden');
  // 重新打開表單Modal
  document.getElementById('modalOverlay').classList.remove('hidden');
}

async function doSubmit() {
  if (!_pendingPayload) return;

  const okBtn = document.getElementById('confirmOkBtn');
  okBtn.disabled = true;
  okBtn.textContent = '送出中…';

  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(_pendingPayload)
    });
    document.getElementById('confirmOverlay').classList.add('hidden');
    document.getElementById('successMsg').innerHTML =
      `<strong>${_pendingPayload.name}</strong> 的意願已記錄！<br>主管統計後將通知結果，謝謝。`;
    document.getElementById('successOverlay').classList.remove('hidden');
    _pendingPayload = null;
  } catch(e) {
    alert('送出失敗，請稍後再試或聯絡主辦人員。');
  } finally {
    okBtn.disabled = false;
    okBtn.textContent = '確認送出 ✓';
  }
}
